# Déploiement continu : chaque push sur master construit le jeu et le
# publie sur GitHub Pages (https://kevininter75-stack.github.io/fruit-ninja-reunion/).
name: Déploiement GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois, les pushes rapprochés annulent le précédent
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      # Pages est activé côté repo (build_type: workflow) ; configure-pages
      # ne fait que lire la configuration — le GITHUB_TOKEN n'a pas le droit
      # de créer le site, c'est fait une fois via l'API
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
